<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — IronCore Fitness</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body id="dashPage">

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="logo">IRONCORE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="plans.html">Plans</a></li>
      <li><a href="#" id="logoutLink">Logout</a></li>
    </ul>
  </nav>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <h1>
      Welcome back, 
      <span id="dashFirst">User</span> 💪
    </h1>

    <div class="profile">
      <h2 id="dashName">Name</h2>
      <p id="dashEmail">email@example.com</p>
      <div id="dashAvatar">U</div>
    </div>

    <button id="logoutBtn">Logout</button>

  </div>

  <script src="script.js"></script>

  <script>
    // ===== GET USER =====
    const user = JSON.parse(localStorage.getItem("loggedInUser"));

    // ===== PROTECT PAGE =====
    if (!user) {
      window.location.href = "login.html";
    }

    // ===== SET USER DATA =====
    if (user) {
      document.getElementById("dashName").textContent = user.name;
      document.getElementById("dashEmail").textContent = user.email;
      document.getElementById("dashFirst").textContent = user.name;
      document.getElementById("dashAvatar").textContent = user.name.charAt(0).toUpperCase();
    }

    // ===== LOGOUT BUTTON =====
    document.getElementById("logoutBtn").addEventListener("click", function () {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    });

    // ===== NAV LOGOUT =====
    document.getElementById("logoutLink").addEventListener("click", function (e) {
      e.preventDefault();
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
